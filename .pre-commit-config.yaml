repos:
  # PEP8 style enforcement
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --ignore=E203]

  # Trailing whitespace and end-of-file newlines
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: debug-statements

  # Run tests before committing to main
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest tests/ -q --tb=short
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
