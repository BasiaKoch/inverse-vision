phantom:
  size: 256

dose_levels:
  - 1.0e5
  - 1.0e3
  - 1.0e2

projection_counts:
  - 360
  - 90
  - 20

angular_ranges:
  - 180
  - 120
  - 40

noise:
  gaussian_sigma: 0.05

reconstruction:
  fbp_filters:
    - ramp
    - shepp-logan
    - cosine
  iterative:
    gamma: 0.001
    max_iterations: 50
    os_sart_n_subsets: 10

random_seed: 42
